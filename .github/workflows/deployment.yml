name: Deployment

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  docs:
    permissions:
      contents: read
      pages: write
      id-token: write
    name: Site
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2

      - name: Setup pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Install mdBook
        run: cargo install mdbook --no-default-features

      - name: Build app (Trunk)
        run: |
          rm -rf site
          make release DIST_DIR=site PUBLIC_URL="${{ steps.pages.outputs.base_url }}/"

      - name: Package circuits source bundle
        run: sh deployments/scripts/package-circuits-source-bundle.sh site/circuits/source-bundle.tar.gz

      - name: Resolve symlinks in docs
        run: |
          cd docs/src
          for f in *.md; do
            if [ -L "$f" ]; then
              cp --remove-destination "$(readlink -f "$f")" "$f"
            fi
          done

      - name: Build mdBook
        env:
          MDBOOK_OUTPUT__HTML__SITE_URL: ${{ steps.pages.outputs.base_url }}/docs/
        run: mdbook build docs/

      - name: Build API documentation
        run: cargo doc --no-deps --workspace --release

      - name: Combine outputs
        run: |
          rm -f target/doc/.lock
          mkdir -p site/docs/api
          cp -r docs/book/* site/docs/
          cp -r target/doc/* site/docs/api/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site

  publish:
    name: Deploy the app and publish docs
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
